<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenISI</title>
    <link rel="stylesheet" href="styles/app.css">
</head>
<body>
    <!-- Icon bar — left edge, always visible. Icons from Lucide (MIT). -->
    <nav id="icon-bar">
        <button id="nav-library" class="icon-btn active" title="Library" data-view="library">
            <!-- Lucide: folder-open -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/>
            </svg>
        </button>
        <button id="nav-session" class="icon-btn disabled" title="Session" data-view="session">
            <!-- Lucide: microscope -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/>
            </svg>
        </button>
        <button id="nav-analysis" class="icon-btn disabled" title="Analysis" data-view="analysis">
            <!-- Lucide: view -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 17v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2"/><path d="M21 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><circle cx="12" cy="12" r="1"/><path d="M18.944 12.33a1 1 0 0 0 0-.66 7.5 7.5 0 0 0-13.888 0 1 1 0 0 0 0 .66 7.5 7.5 0 0 0 13.888 0"/>
            </svg>
        </button>
    </nav>

    <!-- Main content area -->
    <main id="content">
        <!-- Populated by view modules -->
    </main>

    <!-- Preview panel — right side, layered visualization -->
    <aside id="preview-panel" class="hidden">
        <div class="preview-card">
            <div class="preview-label">Camera</div>
            <div class="preview-container" id="cam-container">
                <canvas id="layer-base"></canvas>
                <canvas id="layer-map"></canvas>
                <canvas id="layer-borders"></canvas>
                <canvas id="layer-ring"></canvas>
                <div id="no-camera-msg" class="preview-placeholder">No camera</div>
            </div>
        </div>
        <div class="preview-card">
            <div class="preview-label">Stimulus</div>
            <div class="preview-container" id="stim-container">
                <canvas id="stimulus-canvas"></canvas>
                <div id="no-stimulus-msg" class="preview-placeholder">No stimulus</div>
            </div>
        </div>
    </aside>

    <!-- Layer control bar — right edge, icon buttons with popup menus -->
    <nav id="layer-bar">
        <div class="layer-icon-wrap">
            <button class="layer-icon" id="lbtn-base" title="Base layer">
                <!-- Lucide: brain -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></svg>
            </button>
            <div class="layer-popup" id="popup-base">
                <div class="popup-title">Base Layer</div>
                <button class="popup-opt active" data-val="camera">Camera</button>
                <button class="popup-opt" data-val="anatomical">Anatomical</button>
                <button class="popup-opt" data-val="none">None</button>
            </div>
        </div>
        <div class="layer-icon-wrap">
            <button class="layer-icon" id="lbtn-map" title="Map overlay">
                <!-- Lucide: images -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 22H4a2 2 0 0 1-2-2V6"/><rect width="16" height="16" x="6" y="2" rx="2"/><circle cx="14" cy="8" r="2"/><path d="m22 13.5-5-2.5-5.07 5.07"/></svg>
            </button>
            <div class="layer-popup" id="popup-map">
                <div class="popup-title">Map Overlay</div>
                <button class="popup-opt active" data-val="none">None</button>
                <!-- Remaining buttons built dynamically by setAnalysisFile() -->
                <div class="popup-title" style="margin-top:6px">Opacity</div>
                <div style="display:flex;align-items:center;gap:4px">
                    <input type="range" id="ctrl-map-opacity" min="0" max="100" value="70" style="flex:1">
                    <span id="ctrl-map-opacity-val" class="mono-value" style="font-size:10px">70%</span>
                </div>
                <div class="popup-title" style="margin-top:6px">Blend Mode</div>
                <select id="ctrl-blend-mode" style="width:100%; font-size:11px; padding:2px 4px;">
                    <option value="source-over">Normal</option>
                    <option value="multiply">Multiply</option>
                    <option value="screen">Screen</option>
                    <option value="overlay">Overlay</option>
                    <option value="darken">Darken</option>
                    <option value="lighten">Lighten</option>
                    <option value="color-dodge">Color Dodge</option>
                    <option value="color-burn">Color Burn</option>
                    <option value="hard-light">Hard Light</option>
                    <option value="soft-light">Soft Light</option>
                    <option value="difference">Difference</option>
                    <option value="exclusion">Exclusion</option>
                    <option value="hue">Hue</option>
                    <option value="saturation">Saturation</option>
                    <option value="color">Color</option>
                    <option value="luminosity">Luminosity</option>
                </select>
            </div>
        </div>
        <div class="layer-icon-wrap">
            <button class="layer-icon" id="lbtn-borders" title="Area borders">
                <!-- Lucide: egg-fried -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11.5" cy="12.5" r="3.5"/><path d="M3 8c0-3.5 2.5-6 6.5-6 5 0 4.83 3 7.5 5s5 2 5 6c0 4.5-2.5 6.5-7 6.5-2.5 0-2.5 2.5-6 2.5s-7-2-7-5.5c0-3 1.5-3 1.5-5C3.5 10 3 9 3 8Z"/></svg>
            </button>
            <div class="layer-popup" id="popup-borders">
                <div class="popup-title">VFS Borders</div>
                <button class="popup-opt" data-val="show">Show</button>
                <button class="popup-opt active" data-val="hide">Hide</button>
            </div>
        </div>
        <div class="layer-icon-wrap">
            <button class="layer-icon" id="lbtn-ring" title="Ring overlay">
                <!-- Lucide: crosshair -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="22" x2="18" y1="12" y2="12"/><line x1="6" x2="2" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/></svg>
            </button>
            <div class="layer-popup" id="popup-ring">
                <div class="popup-title">Ring Overlay</div>
                <button class="popup-opt" data-val="show">Show</button>
                <button class="popup-opt active" data-val="hide">Hide</button>
            </div>
        </div>
    </nav>

    <!-- Status bar — bottom edge, always visible -->
    <footer id="status-bar">
        <span id="status-display">Display: —</span>
        <span class="sep">|</span>
        <span id="status-camera">Camera: —</span>
        <span class="sep">|</span>
        <span id="status-activity">Idle</span>
    </footer>

    <script type="module" src="src/main.js"></script>
</body>
</html>
