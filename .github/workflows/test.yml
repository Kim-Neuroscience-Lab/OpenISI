name: Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    strategy:
      # Don't cancel the other OSes when one fails — we need each OS's result
      # independently (e.g. to tell a windows-only path issue from an all-OS
      # numerical/repro issue).
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # actions/checkout and actions/cache run on Node; opt into 24 to avoid Node 20 deprecation.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Include the workflow file in the key so a build-config change (e.g. the
          # cmake generator) invalidates the cache — otherwise a stale CMakeCache.txt
          # from a prior generator (Visual Studio vs Ninja) conflicts with the new one.
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock', '.github/workflows/test.yml') }}

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # The hdf5-metno-src static build runs cmake. The "Visual Studio 17 2022"
      # generator fails on the runner ("could not find any instance of Visual
      # Studio"). Use the MSVC dev environment (puts cl.exe on PATH) + the Ninja
      # generator (installed by lukka/get-cmake) — the reliable pattern for cmake
      # C builds on Windows CI; Ninja drives cl.exe directly, no VS-instance lookup.
      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Use Ninja for cmake (Windows)
        if: runner.os == 'Windows'
        run: echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV

      # Default shell (PowerShell on Windows) so the native build env is unchanged.
      # Tests self-report failures as `::error::` lines on stdout, which GitHub
      # turns into annotations (readable via the public check-runs API) regardless
      # of shell — no build-affecting wrapper needed.
      - name: Run tests
        run: cargo test --workspace --no-fail-fast
