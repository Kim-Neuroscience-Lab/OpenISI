name: Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    strategy:
      # Don't cancel the other OSes when one fails — we need each OS's result
      # independently (e.g. to tell a windows-only path issue from an all-OS
      # numerical/repro issue).
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # actions/checkout and actions/cache run on Node; opt into 24 to avoid Node 20 deprecation.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set CMake generator (Windows)
        if: runner.os == 'Windows'
        run: echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --no-fail-fast 2>&1 | tee test-output.txt || true
          # Surface failing test names + panics as annotations (readable via the
          # public check-runs API without log auth) so CI failures are diagnosable.
          grep -nE '\.\.\. FAILED|test result: FAILED|panicked at|error\[' test-output.txt \
            | sed 's/^/::error::/' || true
          if grep -qE '\.\.\. FAILED|test result: FAILED|error\[E|could not compile' test-output.txt; then
            echo "::error::cargo test --workspace failed on ${{ matrix.os }}"
            exit 1
          fi
