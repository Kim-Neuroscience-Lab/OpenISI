name: Golden freshness

# Oracle golden-fixture freshness gate. Regenerates every golden fixture from
# its oracle generator (SNLC/Garrett under Octave, Allen/Zhuang transcriptions
# under Python) and asserts AGREEMENT with the committed copies — catching the
# case where a generator is edited but its fixture isn't regenerated. Agreement
# is tolerance-based, not byte-identity: this runner's toolchain differs from the
# dev host that committed the fixtures, so float results round differently, and
# device-identity is not a validity check. Discrete fixtures (masks/labels/raw
# frames) are held bit-exact; float fixtures are compared through the project's
# ε-grounded comparator (crates/agreement), with the measured cross-toolchain
# drift logged each run. See xtask `build_freshness_report` / `FIXTURE_DTYPES`.
#
# Kept SEPARATE from the main `Test` workflow (which stays hermetic and
# toolchain-free): only this job installs Octave + the pinned Python toolchain,
# and only when oracle/fixture/harness files change.
#
# Runs on ubuntu (cheap, reliable apt-Octave). The committed fixtures must be
# reproducible on this toolchain; if a float-valued fixture proves OS-sensitive,
# regenerate it on this runner (or pin the toolchain to its origin) — the gate
# documenting that is the gate working.

on:
  push:
    paths:
      - "crates/isi-analysis/tests/golden/**"
      - "xtask/**"
      - "tools/golden/**"
      - ".github/workflows/goldens.yml"
  pull_request:
    paths:
      - "crates/isi-analysis/tests/golden/**"
      - "xtask/**"
      - "tools/golden/**"
      - ".github/workflows/goldens.yml"
  workflow_dispatch:

jobs:
  goldens:
    # Pinned Ubuntu (fixed Octave version) — see oracle.yml. The freshness gate
    # regenerates fixtures on THIS runner's Octave/Python, which differ at the bit
    # level from the dev host (Octave 11.2.0) that committed them; the comparison
    # is therefore tolerance-based (ε-grounded, via crates/agreement), so the gate
    # is device-independent. Pinning the runner fixes the Octave version so the
    # measured drift the gate logs is stable and auditable across runs.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # The oracle `.m`/`.py` generators addpath/import the genuine reference, which
      # is gitignored (large third-party). Materialise it byte-pristine at the
      # committed pinned commits before regenerating goldens.
      - name: Materialise pinned oracle reference (byte-pristine)
        run: bash tools/oracle/fetch-reference.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Octave (oracle .m generators)
        run: |
          sudo apt-get update
          sudo apt-get install -y octave

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pinned Python oracle toolchain
        run: python -m pip install -r tools/golden/requirements.txt

      - name: Golden freshness gate
        env:
          OPENISI_PYTHON: python
          OPENISI_OCTAVE: octave-cli
        run: cargo xtask goldens --check
