name: Genuine-oracle validation

# Runs the live oracle suite on a CLEAN runner from committed lockfiles alone — the
# "reproduces on a second machine" gate (objective 7). TWO jobs with different
# fidelity, labelled honestly:
#
#   * `oracle` (hosted, always-on) — the NAT/Allen Python oracle is GENUINE here
#     (CPython, uv-locked, the real reference interpreter). The SNLC side runs the
#     real `.m` under **Octave**, which is a re-implementation of the MATLAB
#     *language* — so for SNLC this is an OPEN CROSS-CHECK, not the genuine MATLAB
#     oracle (Octave ≠ MATLAB; see the imclose-border + split/fuse divergences).
#   * `oracle-matlab` (self-hosted, MATLAB machine) — SNLC under GENUINE MATLAB, the
#     authoritative oracle. Free hosted MATLAB-in-Actions can't reach our cargo-
#     spawned matlab-batch (action-scoped licence, see that job), so this needs a
#     self-hosted runner; it also runs locally on the dev host.
#
# Kept separate from the hermetic `Test` workflow; only this workflow provisions the
# oracle toolchains, and only when oracle / harness / reference files change.

on:
  push:
    paths:
      - "crates/isi-analysis/tests/oracle/**"
      # The `oracle_live`-gated live tests live in the crate's lib source (spread
      # across methods/, segmentation/, compute/), not just test_support.rs — so a
      # change to ANY of them must fire this job, else objective 7's "reproduces
      # off-machine" guarantee is hollow for that test.
      - "crates/isi-analysis/src/**"
      - "reference/**"
      - ".github/workflows/oracle.yml"
  pull_request:
    paths:
      - "crates/isi-analysis/tests/oracle/**"
      - "crates/isi-analysis/src/**"
      - "reference/**"
      - ".github/workflows/oracle.yml"
  workflow_dispatch:

jobs:
  oracle:
    # Pinned Ubuntu (NOT ubuntu-latest) so the SNLC oracle's Octave version is
    # fixed — Ubuntu does not bump Octave's major/minor within a release, so the
    # env can't silently drift when the `-latest` alias advances. The exact version
    # is logged each run (below) for an auditable record. (For a fully digest-locked
    # Octave, a `container:` image would be the next step; ubuntu-24.04 + the version
    # log is the practical lock and the suite reproduces green on it.)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # The genuine reference code (SNLC `.m`, NeuroAnalysisTools) is third-party
      # and large (~289 MB full tree) — gitignored, NOT vendored. Materialise it
      # byte-pristine at the committed pinned commits, so this job validates against
      # the EXACT reference, reconstructed from committed pins (objective 3 + 7).
      - name: Materialise pinned oracle reference (byte-pristine)
        run: bash tools/oracle/fetch-reference.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # --- NAT oracle: Python, materialised from the committed uv.lock -----------
      - name: Install uv (NAT oracle env manager)
        uses: astral-sh/setup-uv@v5

      - name: Materialise the NAT env from the committed lock (exact, --locked)
        # --locked fails if uv.lock is stale: proves the env is reproduced from the
        # committed lock alone, not from whatever happens to resolve today.
        run: uv sync --project crates/isi-analysis/tests/oracle/nat --locked

      # --- SNLC oracle: Octave + the image package -------------------------------
      # Octave version is fixed by the pinned ubuntu-24.04 runner (above). It differs
      # from the dev host's Octave 11.2.0, but the Octave≈MATLAB gap is an already-
      # flagged, ε-tolerated approximation (see tests/oracle/snlc/README.md) and the
      # version difference is a sub-case of it — the live suite reproduces GREEN here
      # within those bounds (tolerance-based validity, not bit-identity). The exact
      # version is recorded each run so any future drift is visible, not assumed away.
      - name: Install Octave + image package (SNLC oracle env)
        run: |
          sudo apt-get update
          sudo apt-get install -y octave octave-image
          echo "::notice title=SNLC oracle Octave::$(octave-cli --version | head -1)"
          octave-cli --version | head -1

      # --- the genuine-oracle suite, live ----------------------------------------
      - name: Genuine-oracle suite (live, against the real references)
        env:
          OPENISI_UV: uv
          OPENISI_OCTAVE: octave-cli
        run: cargo test -p isi-analysis --lib --features oracle_live

  # ── Genuine MATLAB SNLC oracle — SELF-HOSTED runner (the lab's licensed MATLAB) ──
  # SNLC is MATLAB code, so genuine MATLAB is the ONLY faithful oracle for it: Octave
  # is a re-implementation of the MATLAB *language*, so running the `.m` under Octave
  # validates against Octave's interpretation, NOT the reference the field used (the
  # imclose-border + split/fuse divergences are direct proof). The `oracle` job above
  # is therefore an OPEN CROSS-CHECK (genuine NAT/Python + Octave-SNLC), not the
  # genuine MATLAB-SNLC gate.
  #
  # Free MATLAB-in-Actions for public repos is real, but its licence is ACTION-SCOPED:
  # it licenses only the matlab the matlab-actions run-* actions launch, and does NOT
  # reach the `matlab-batch` our `cargo` harness spawns per oracle call. Empirically
  # confirmed over three attempts (setup-matlab + bare matlab-batch; +id-token:write;
  # run-command wrapping cargo) — all fail "Unable to find a license" (Error -1.2),
  # the nested matlab-batch falling through to a license-FILE search. So genuine-MATLAB
  # CI needs a SELF-HOSTED runner on a MATLAB-licensed machine (the lab workstation has
  # R2025b). It runs the SAME suite as the Octave job but with SNLC under genuine
  # MATLAB — the authoritative oracle (imclose border exact, split/fuse runnable) and
  # a faithful objective-7 "second machine".
  #
  # SKIPPED (not failed) until the lab registers a runner labelled `self-hosted,matlab`
  # (with MATLAB R2025b + IPT on its PATH) and sets repo variable
  # `SELF_HOSTED_MATLAB=true`. Genuine MATLAB also runs LOCALLY on the dev host
  # (`OPENISI_MATLAB=<matlab path>` + `cargo test -p isi-analysis --lib --features
  # oracle_live`) — the always-available authoritative path.
  oracle-matlab:
    if: ${{ vars.SELF_HOSTED_MATLAB == 'true' }}
    runs-on: [self-hosted, matlab]
    steps:
      - uses: actions/checkout@v4
      - name: Materialise pinned oracle reference (byte-pristine)
        run: bash tools/oracle/fetch-reference.sh
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install uv (NAT oracle env manager)
        uses: astral-sh/setup-uv@v5
      - name: Materialise the NAT env from the committed lock (exact, --locked)
        run: uv sync --project crates/isi-analysis/tests/oracle/nat --locked
      - name: Genuine-oracle suite (SNLC via the runner's licensed MATLAB)
        env:
          OPENISI_UV: uv
          # The runner's own MATLAB install is fully licensed → `matlab -batch` works
          # directly (no token). Override if the binary is not named `matlab` on PATH.
          OPENISI_MATLAB: matlab
        run: cargo test -p isi-analysis --lib --features oracle_live
