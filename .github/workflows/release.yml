name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set CMake generator (Windows)
        if: runner.os == 'Windows'
        run: echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV

      - name: Run tests
        run: cargo test --workspace

      - name: Build release binaries
        run: cargo build --release

      - name: Build installer
        run: cargo tauri build

      - name: Prepare Windows artifacts
        if: matrix.target == 'windows'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release-artifacts

          # Portable zip
          mkdir -p OpenISI-${VERSION}-windows-x64/config
          cp target/release/openisi.exe "OpenISI-${VERSION}-windows-x64/"
          cp target/release/headless.exe "OpenISI-${VERSION}-windows-x64/"
          cp config/* "OpenISI-${VERSION}-windows-x64/config/"
          cp src-tauri/icons/icon.ico "OpenISI-${VERSION}-windows-x64/"
          cd "OpenISI-${VERSION}-windows-x64" && 7z a "../release-artifacts/OpenISI-${VERSION}-windows-x64.zip" * && cd ..

          # MSI installer
          cp target/release/bundle/msi/*.msi "release-artifacts/" 2>/dev/null || true

      - name: Prepare macOS artifacts
        if: matrix.target == 'macos'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release-artifacts
          cp target/release/bundle/dmg/*.dmg "release-artifacts/" 2>/dev/null || true
          cp target/release/bundle/macos/*.app.tar.gz "release-artifacts/" 2>/dev/null || true

      - name: Prepare Linux artifacts
        if: matrix.target == 'linux'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release-artifacts
          cp target/release/bundle/deb/*.deb "release-artifacts/" 2>/dev/null || true
          cp target/release/bundle/appimage/*.AppImage "release-artifacts/" 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-artifacts/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
