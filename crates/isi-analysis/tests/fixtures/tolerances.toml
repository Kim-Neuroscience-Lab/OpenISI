# Per-dataset cross-implementation / cross-backend agreement bounds.
#
# The comparator (tests/equivalence.rs) routes EVERY dataset through the project's
# single Оө-grounded comparator, `agreement::Tol` вҖ” the same one the in-crate
# goldens use. There is no hand-rolled comparison loop and no raw float bound here.
#
# GROUNDING вҖ” no magic numbers, and now TYPE-ENFORCED. Each entry stores an integer
# factor `k` (and, for relative bounds, a floor factor `k_floor`); the comparator
# builds the bound as `k В· Оө_f32` via `Tol`, where Оө_f32 = 2вҒ»ВІВі вүҲ 1.1921e-7. A raw
# float threshold is therefore not even expressible in this file вҖ” the `# KВ·Оө`
# grounding is the value, not a comment that can drift from it.
#
# `k` is the error-propagation factor for that stage's operation count, Г—2 for a
# cross-backend compare (two independent f32 implementations of the same op). It is
# the smallest power-of-two that bounds the OBSERVED cross-backend (Burn ndarray-CPU
# vs CUDA) / cross-device drift on the R43 fixture with margin. Any future change
# that pushes a dataset past its `k` is investigated, not absorbed by raising `k`.
#
# `kind` selects the grounded `Tol` constructor:
#   - "exact"  вҶ’ Tol::exact()                  discrete masks/labels/contours/signs
#   - "abs"    вҶ’ Tol::abs(k, F32)              signed / zero-crossing / bounded (rtol=0)
#   - "rel"    вҶ’ Tol::rel(k, F32, k_floor)     positive magnitude (relative + floor)
#   - "wrap"   вҶ’ Tol::wrap(2ПҖ, k, F32, 1)      angular (radians), wrap-aware absolute
#
# k reference: 256В·ОөвүҲ3.05e-5 В· 512В·ОөвүҲ6.10e-5 В· 1024В·ОөвүҲ1.22e-4 В· 131072В·ОөвүҲ1.56e-2

# в”Җв”Җ Stage 0: DFT / phase extraction (complex maps, re/im вҖ” cross zero) в”Җв”Җ
# k=256: DFT is a length-T reduction; the f32 reduction-order difference is the
# dominant term. The k_floor floors re/im near zero.
[complex_maps.alt_fwd]
kind = "rel"
k = 256
k_floor = 256
[complex_maps.alt_rev]
kind = "rel"
k = 256
k_floor = 256
[complex_maps.azi_fwd]
kind = "rel"
k = 256
k_floor = 256
[complex_maps.azi_rev]
kind = "rel"
k = 256
k_floor = 256

# в”Җв”Җ Stages 1вҖ“3: phase (radians), phase-degrees, amplitude в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Phase is angular вҶ’ wrap-aware absolute radians bound (kВ·Оө). Observed вүӨ 6e-6 rad.
[results.azi_phase]
kind = "wrap"
k = 512   # 512В·Оө rad
[results.alt_phase]
kind = "wrap"
k = 512
# Phase-in-degrees is large-valued вҶ’ relative. Observed вүӨ 1e-4 abs over ~tens of
# degrees вҮ’ ~2e-6 relative; k=256 with a floor for near-zero offsets.
[results.azi_phase_degrees]
kind = "rel"
k = 256
k_floor = 256
[results.alt_phase_degrees]
kind = "rel"
k = 256
k_floor = 256
# Amplitude is a positive magnitude вҶ’ relative. k=1024 covers small-amplitude px.
[results.azi_amplitude]
kind = "rel"
k = 1024
k_floor = 256
[results.alt_amplitude]
kind = "rel"
k = 1024
k_floor = 256

# в”Җв”Җ VFS (bounded [-1,1], crosses zero вҶ’ absolute) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# k_eff=1024 as an absolute floor; the chain-rule gradient is more conditioned
# than the smoothed maps. Observed вүӨ 9.3e-5.
[results.vfs]
kind = "abs"
k = 1024
[results.vfs_smoothed]
kind = "abs"
k = 256   # observed вүӨ 1.7e-6
[results.vfs_smoothed_thresholded]
kind = "abs"
k = 256   # NaN outside cortex; comparator is NaN-position-aware

# в”Җв”Җ Segmentation: discrete decisions, must not drift в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[results.cortex_mask]
kind = "exact"
[results.area_labels]
kind = "exact"
[results.area_signs]
kind = "exact"
[results.area_borders]
kind = "exact"
[results.contours_azi]
kind = "exact"
[results.contours_alt]
kind = "exact"

# в”Җв”Җ Eccentricity (degrees, positive magnitude вҶ’ relative) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[results.eccentricity]
kind = "rel"
k = 256   # observed вүӨ 7.9e-6
k_floor = 256

# в”Җв”Җ Polar angle (degrees, atan2 about V1 center вҶ’ crosses zero, Вұ180) в”Җв”Җв”Җ
# Angular like eccentricity but signed and zero-crossing, so the floor carries
# the near-zero pixels; same k=256 propagation as eccentricity.
[results.polar_angle]
kind = "rel"
k = 256
k_floor = 256

# в”Җв”Җ Magnification = 1/|det J| вҖ” ill-conditioned reciprocal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# `det J` is a catastrophic-cancellation difference; at near-singular pixels its
# condition number Оә amplifies f32 error, so this map's relative bound is
# *legitimately* larger вҖ” the one map grounded as ОәВ·Оө, not a small constantВ·Оө.
# MEASURED on R43 (in-ROI): min |det J| вүҲ 2.5e-6 вҖ” the 1e-12 EPS floor in
# `cortical_magnification_factor` is NEVER reached вҖ” and the magnification tail
# reaches вүҲ 3.99e5 pxВІ/degВІ (not ~1e7) at ~0.1% of ROI pixels. Worst cross-backend
# drift (CUDA vs ndarray) = max_rel вүҲ 1.019e-2 at that most near-singular pixel,
# where Оә вүҲ 85 000 arises from the cancellation in `det` itself (NOT from the floor).
# k = Оә_maxВ·2 with Оә_max вүҲ 85 000 вҮ’ k вүҲ 131072 вҮ’ rtol вүҲ 1.56e-2.
# NOTE: this looseness is inherent ill-conditioning at a handful of numerically
# degenerate pixels вҖ” the values are mathematically correct (1/det), and the
# renderer's 2вҖ“98 percentile scaling already ignores the tail. NO cap is applied,
# on oracle grounds: Allen `_getDeterminantMap` outputs |det J| (our
# `magnification_raw`) and NEVER inverts вҖ” the 1/det leaf is OpenISI's display
# transform, so the tail is an inversion artifact, not an oracle quantity. See
# math.rs `cortical_magnification_factor`.
[results.magnification]
kind = "rel"
k = 131072   # Оә_maxВ·2, Оә_max вүҲ 85 000 (cancellation in det)
k_floor = 256

# в”Җв”Җ Magnification anisotropy (SNLC getMagFactors prefAxisMF + Distrtion) в”Җв”Җ
# magnification_axis = вҲ Res/2 (deg, wraps at 180В°). arg(z) has condition number
# Оә = 1/|Res| = 1/distortion, so it is ILL-CONDITIONED where distortion вҶ’ 0.
# Validity must hold on ANY CPU/GPU/OS вҖ” a bit-exact-on-one-machine pin is not a
# device-independent gate. MEASURED cross-CPU drift (ubuntu/macos runners vs the
# baseline host, same ndarray backend) is max_abs 4.64e-3В° / max_rel 1.36e-3
# (empirical Оә вүҲ 5700) at the most near-isotropic pixels; by analogy to the sibling
# 1/det `magnification` leaf (cross-backend CUDA вүҲ 7.5Г— the cross-CPU drift) a GPU
# backend reaches вүҲ1e-2В°. k = 131072 (abs deg) covers both, matching magnification's
# Оә-bound k, while staying far tighter than any real regression (>0.016В° shift) on
# the dev host. (A wrap-180 distance is not yet needed вҖ” no observed pixel sits near
# the 0/180 seam; switch kind to "wrap" with period 180 if a future fixture does.)
[results.magnification_axis]
kind = "abs"
k = 131072   # 131072В·Оө_f32 deg вҖ” Оә=1/distortion ill-conditioning, device-independent
# magnification_distortion = |Res| is a well-conditioned bounded [0,1] magnitude.
[results.magnification_distortion]
kind = "rel"
k = 256
k_floor = 256

# в”Җв”Җ Delay maps (degrees, (0,180], present under delay-subtraction) в”Җв”Җв”Җв”Җв”Җв”Җ
# Angular magnitude вҶ’ relative, like eccentricity; the floor carries the near-zero
# (flip-region) pixels. Same k=512 propagation as the phase maps the delay is
# derived from (atan2 + sign correction). Absent for unweighted-average combine.
[results.azi_delay]
kind = "rel"
k = 512
k_floor = 512
[results.alt_delay]
kind = "rel"
k = 512
k_floor = 512

# в”Җв”Җ Optional responsiveness / reliability (raw-acquisition inputs only) в”Җ
[results.spectral_snr_azi]
kind = "rel"
k = 1024
k_floor = 1024
[results.spectral_snr_alt]
kind = "rel"
k = 1024
k_floor = 1024
[results.allen_power_snr_azi]
kind = "rel"
k = 1024
