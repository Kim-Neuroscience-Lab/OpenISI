# Per-dataset cross-implementation / cross-backend agreement bounds.
#
# The comparator (tests/equivalence.rs) applies the standard relative form
#     |candidate − baseline| ≤ rtol·max(|c|,|b|) + atol
# at EVERY finite pixel (worst-ratio ≤ 1 to pass). Floating-point error is
# *relative*, so `rtol` is the primary bound; `atol` only floors it where a
# signed/bounded quantity passes through zero.
#
# GROUNDING — no magic numbers. Every `rtol` is a multiple of the IEEE-754
# single-precision machine epsilon, ε_f32 = 2⁻²³ ≈ 1.1921e-7:
#
#     rtol = K · ε_f32
#
# K is the error-propagation factor for that stage's operation count, ×2 for a
# cross-backend compare (two independent f32 implementations of the same op).
# K is recorded inline with its justification and is the smallest power-of-two
# that bounds the OBSERVED cross-backend (Burn ndarray-CPU vs CUDA) drift on the
# R43 fixture with margin. Any future change that pushes a dataset past its K is
# investigated, not absorbed by raising K.
#
# `bit_exact = true` (discrete masks/labels/contours) forces full-array equality.
#
# K reference: 256·ε≈3.05e-5  ·  512·ε≈6.10e-5  ·  1024·ε≈1.22e-4  ·  8192·ε≈9.77e-4

# ── Stage 0: DFT / phase extraction (complex maps, re/im — cross zero) ──
# K=256: DFT is a length-T reduction; the f32 reduction-order difference is the
# dominant term. atol floors re/im near zero.
[complex_maps.alt_fwd]
rtol = 3.05e-5   # 256·ε
atol = 3.05e-5
[complex_maps.alt_rev]
rtol = 3.05e-5
atol = 3.05e-5
[complex_maps.azi_fwd]
rtol = 3.05e-5
atol = 3.05e-5
[complex_maps.azi_rev]
rtol = 3.05e-5
atol = 3.05e-5

# ── Stages 1–3: phase (radians), phase-degrees, amplitude ──────────────
# Phase is angular → absolute radians bound (rtol=0, atol). Observed ≤ 6e-6 rad.
[results.azi_phase]
atol = 6.10e-5   # 512·ε rad
[results.alt_phase]
atol = 6.10e-5
# Phase-in-degrees is large-valued → relative. Observed ≤ 1e-4 abs over ~tens of
# degrees ⇒ ~2e-6 relative; K=256 with an atol floor for near-zero offsets.
[results.azi_phase_degrees]
rtol = 3.05e-5   # 256·ε
atol = 3.05e-5
[results.alt_phase_degrees]
rtol = 3.05e-5
atol = 3.05e-5
# Amplitude is a positive magnitude → relative. K=1024 covers small-amplitude px.
[results.azi_amplitude]
rtol = 1.22e-4   # 1024·ε
atol = 3.05e-5
[results.alt_amplitude]
rtol = 1.22e-4
atol = 3.05e-5

# ── VFS (bounded [-1,1], crosses zero → absolute) ──────────────────────
# K_eff=1024 as an absolute floor; the chain-rule gradient is more conditioned
# than the smoothed maps. Observed ≤ 9.3e-5.
[results.vfs]
atol = 1.22e-4   # 1024·ε
[results.vfs_smoothed]
atol = 3.05e-5   # 256·ε; observed ≤ 1.7e-6
[results.vfs_smoothed_thresholded]
atol = 3.05e-5   # NaN outside cortex; comparator is NaN-position-aware

# ── Segmentation: discrete decisions, must not drift ───────────────────
[results.cortex_mask]
bit_exact = true
[results.area_labels]
bit_exact = true
[results.area_signs]
bit_exact = true
[results.area_borders]
bit_exact = true
[results.contours_azi]
bit_exact = true
[results.contours_alt]
bit_exact = true

# ── Eccentricity (degrees, positive magnitude → relative) ──────────────
[results.eccentricity]
rtol = 3.05e-5   # 256·ε; observed ≤ 7.9e-6
atol = 3.05e-5

# ── Polar angle (degrees, atan2 about V1 center → crosses zero, ±180) ───
# Angular like eccentricity but signed and zero-crossing, so an atol floor
# carries the near-zero pixels; same K=256 propagation as eccentricity.
[results.polar_angle]
rtol = 3.05e-5   # 256·ε
atol = 3.05e-5

# ── Magnification = 1/|det J| — ill-conditioned reciprocal ─────────────
# `det J` is a catastrophic-cancellation difference; at near-singular pixels its
# condition number κ amplifies f32 error, so this map's relative bound is
# *legitimately* larger — the one map grounded as κ·ε, not a small constant·ε.
# MEASURED on R43 (in-ROI): min |det J| ≈ 2.5e-6 — the 1e-12 EPS floor in
# `cortical_magnification_factor` is NEVER reached — and the magnification tail
# reaches ≈ 3.99e5 px²/deg² (not ~1e7) at ~0.1% of ROI pixels. Worst cross-backend
# drift (CUDA vs ndarray) = max_rel ≈ 1.019e-2 at that most near-singular pixel,
# where κ ≈ 85 000 arises from the cancellation in `det` itself (NOT from the floor).
# rtol = κ_max·2·ε with κ_max ≈ 85 000 ⇒ K ≈ 131072 ⇒ rtol ≈ 1.56e-2.
# NOTE: this looseness is inherent ill-conditioning at a handful of numerically
# degenerate pixels — the values are mathematically correct (1/det), and the
# renderer's 2–98 percentile scaling already ignores the tail. NO cap is applied,
# on oracle grounds: Allen `_getDeterminantMap` outputs |det J| (our
# `magnification_raw`) and NEVER inverts — the 1/det leaf is OpenISI's display
# transform, so the tail is an inversion artifact, not an oracle quantity. Capping
# would diverge from the oracle to patch our own transform; a physical cap would
# need V1's extent, itself a literature magic-number. See math.rs
# `cortical_magnification_factor`.
[results.magnification]
rtol = 1.56e-2   # 131072·ε = κ_max·2·ε, κ_max ≈ 85 000 (cancellation in det)
atol = 3.05e-5

# ── Optional responsiveness / reliability (raw-acquisition inputs only) ─
[results.spectral_snr_azi]
rtol = 1.22e-4   # 1024·ε
atol = 1.22e-4
[results.spectral_snr_alt]
rtol = 1.22e-4
atol = 1.22e-4
[results.allen_power_snr_azi]
rtol = 1.22e-4
atol = 1.22e-4
[results.allen_power_snr_alt]
rtol = 1.22e-4
atol = 1.22e-4
