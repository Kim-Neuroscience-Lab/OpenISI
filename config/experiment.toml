# Two geometry sections, semantically distinct:
#
# [geometry] is RIG-level — describes the projection model used to
# warp the flat stimulus onto the viewer's visual field (spherical /
# cylindrical / cartesian) and the rendering offsets from the
# monitor center. These affect what's drawn on the screen.
#
# [stimulus_geometry] is STIMULUS-SWEEP-level — describes the
# extent and zero-offset of the sweep itself (how many degrees the
# bar traverses, where the visual-field zero is). These feed
# `AcquisitionProperties` at analysis time so phase maps can be
# converted to visual-field degrees correctly.
#
# Both are persisted into the .oisi at capture time
# (`/experiment_params`) and read back during analysis.

[geometry]
horizontal_offset_deg = 0.0
vertical_offset_deg = 0.0
projection = "spherical"

[stimulus_geometry]
# Zhuang 2017 (eLife) canonical envelope: -10° to 130° azimuth (140°),
# -50° to 60° altitude (110°). Marshel 2011 uses 147° × 153°.
azi_angular_range = 140.0
alt_angular_range = 110.0
offset_azi = 0.0
offset_alt = 0.0
# Number of 90° CCW rotations of camera-frame position maps before
# analysis (absorbs fixed rig-camera orientation offsets).
rotation_k = 0

[stimulus]
envelope = "bar"
carrier = "checkerboard"

[stimulus.params]
contrast = 1.0
mean_luminance = 0.5
# Black outside the bar (rig choice; diverges from the Marshel / Zhuang
# mean-gray convention for a clean stimulus/FOV boundary).
background_luminance = 0.0
check_size_deg = 25.0
check_size_cm = 1.0
strobe_frequency_hz = 6.0
stimulus_width_deg = 20.0
# Marshel 8.5-9.5°/s, Zhuang 9°/s.
sweep_speed_deg_per_sec = 9.0
rotation_speed_deg_per_sec = 15.0
expansion_speed_deg_per_sec = 5.0
rotation_deg = 0.0

[presentation]
conditions = [
    "LR",
    "RL",
    "TB",
    "BT",
]
repetitions = 1
structure = "blocked"
order = "sequential"

[timing]
baseline_start_sec = 5.0
baseline_end_sec = 5.0
inter_stimulus_sec = 0.0
inter_direction_sec = 5.0
