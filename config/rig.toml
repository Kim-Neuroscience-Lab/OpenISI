[camera]
exposure_us = 1000
binning = 4
# Spatial calibration: micrometers per camera pixel. Used to convert
# physical-unit smoothing sigmas (e.g. sigma_um) into pixel counts at
# runtime. 20 µm/px matches typical mouse-cortex imaging (Allen Brain
# Observatory). Override per-rig when the camera setup differs.
um_per_pixel = 20.0

[geometry]
viewing_distance_cm = 10.0

[ring_overlay]
enabled = false
radius_px = 200
center_x_px = 512
center_y_px = 512

[display]
target_stimulus_fps = 60
monitor_rotation_deg = 180.0

[system]
camera_frame_send_interval_ms = 33
camera_poll_interval_ms = 1
camera_first_frame_timeout_ms = 5000
camera_first_frame_poll_ms = 10
display_validation_sample_count = 150
preview_width_px = 320
preview_interval_ms = 100
preview_cycle_sec = 10.0
idle_sleep_ms = 16
fps_window_frames = 10
drop_detection_warmup_frames = 10
drop_detection_threshold = 1.5

[paths]
data_directory = "/Users/Adam/openisi/data"
experiments_directory = ""
