# OpenISI analysis pipeline — user-editable parameter state.
#
# This file is the cross-session persistence layer for analysis
# parameters: schema lives in `src-tauri/src/params/definitions.rs`,
# this file carries the current values for THIS machine, and each
# .oisi's `/analysis_params` HDF5 attr carries a frozen snapshot per
# analysis. Edit values here OR via the UI; either path goes through
# the Registry.
#
# Defaults shown match `PARAM_DEFS` in `definitions.rs`; absence of a
# key (e.g. comment out a line) restores the registry default.
#
# Every per-stage analysis tunable is a first-class Registry parameter.
# There are NO `const FOO_DEFAULT` in `crates/isi-analysis/src/methods/`;
# the method enums there are pure runtime containers populated from this
# file by the src-tauri → analysis bridge.

# Stage 1 — Cycle combine (fwd+rev → position phasor).
[cycle_combine]
method = "marshel_garrett2011_delay_subtraction"

# Stage 2 — Phase / position phasor smoothing.
[phase_smoothing]
method = "open_isi_amp_weighted_phasor"

[phase_smoothing.open_isi_amp_weighted_phasor]
# Allen `phaseMapFilterSigma` (Zhuang 2017, `RetinotopicMapping.py` L298).
sigma_px = 1.0

# Stage 3 — Visual field sign computation.
[vfs_computation]
method = "open_isi_chain_rule_phasor_gradient"

# Stage 4 — Sign map smoothing.
[sign_map_smoothing]
method = "gaussian"

[sign_map_smoothing.gaussian]
# OpenISI 60 µm = σ_px=3 at 20 µm/px. Allen's σ=180 µm requires the
# split/merge passes and over-merges on R43 without them.
sigma_um = 60.0

# Stage 5 — Cortex / ROI source.
[cortex_source]
method = "snlc_garrett2014_im_bound"

[cortex_source.reliability]
threshold = 0.5

[cortex_source.snlc_garrett2014_im_bound]
# Garrett 2014 `getMouseAreasX.m` L76-95.
k = 1.5
close = 10
dilate = 3

# Stage 6 — Patch threshold (which pixels become patch candidates).
[patch_threshold]
method = "garrett2014_sigma_scaled"

[patch_threshold.allen_zhuang2017_fixed_sign_map_thr]
# Allen `signMapThr` (Zhuang 2017, `RetinotopicMapping.py` L1002).
value = 0.35

[patch_threshold.garrett2014_sigma_scaled]
# Juavinett 2017 / SNLC `getMouseAreasX.m` L61.
k = 1.5

# Stage 7 — Patch extraction (open → label → per-patch close → union →
# Allen dilationPatches2 → label → drop small + isolated).
[patch_extraction]
method = "allen_zhuang2017_label_open_close_dilate"

[patch_extraction.allen_zhuang2017_label_open_close_dilate]
# Allen `_getRawPatchMap` defaults (`RetinotopicMapping.py`).
open_iter = 3
close_iter = 3
dilation_iter = 15
border_width = 1
# OpenISI deviation from Allen 100 — preserves edge areas P/POR.
small_patch_thr = 50

# Stage 8 — Patch refinement (split + merge).
[patch_refinement]
method = "allen_zhuang2017_split_merge"

[patch_refinement.allen_zhuang2017_split_merge]
split_overlap_thr = 1.1
split_local_min_cut_step = 5.0
# OpenISI deviation from Allen 0.1 — our watershed cleanly partitions
# patches; Allen's 0.1 would undo every legitimate split.
merge_overlap_thr = 0.01
visual_space_pixel_size = 0.5
visual_space_close_iter = 15
ecc_map_filter_sigma = 10
border_width = 1
small_patch_thr = 100

# Stage 9 — Per-pixel quality gate.
[quality_gate]
method = "none"

# Stage 10 — Eccentricity map.
[eccentricity]
method = "garrett2014_whole_cortex_v1"
